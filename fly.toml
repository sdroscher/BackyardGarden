app = "backyardgarden"
primary_region = "sjc"

[build]

[env]
  PHX_HOST = "backyardgarden.fly.dev"
  PHX_SERVER = "true"
  DEFAULT_LOCATION = "Victoria,CA"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "20s"
    interval = "30s"
    method = "GET"
    path = "/"
    timeout = "5s"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
